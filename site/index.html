<section class="hub-hero">
  <h1>JIUTIAN Research 体系化人工智能 论文展示</h1>
  <p>
    体系化人工智能（Holistic AI）是人工智能技术探索发展的方向之一，主要研究对人工智能技术进行体系化重构所需的理论、技术、
    机制、范式和框架，其主要特征为<strong>AI原子化</strong>、<strong>大闭环优化</strong>、<strong>网络原生</strong>及<strong>安全可信AI</strong>。
    体系化人工智能依托泛在的网络和 AI 算力，在开放环境中实现对AI能力进行灵活且高效的配置、调度、训练和部署，以满足日益丰富的数智化业务需求，
    同时确保 AI 业务可信可控安全。
  </p>
</section>
