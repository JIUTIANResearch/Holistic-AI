name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 生成 demo 的脚本模式 JSON 数据（复用现有 engine/scenarios，无外部依赖）
      - name: Build demos static data
        run: python demos/build_static.py

      - name: Assemble static site
        run: |
          # Pages 根 = site/（Hub 首页 + 论文概览，数据驱动自 papers.json）
          cp -r site _site
          # 交互演示（纯静态）→ /demos/papers/* + /demos/shell/
          cp -r demos _site/demos

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
